<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form class="register-form" novalidate>
            <h1>Teacher Log in</h1>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                <span class="error-message">Username is required</span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required minlength="6">
                    <button type="button" id="toggle-password" aria-label="Show password">Show</button>
                </div>
                <span class="error-message">Password must be at least 6 characters</span>
            </div>

            <button type="submit" class="submit-btn">Log in</button>
        </form>
    </div>

    <script>
        // Toggle show/hide password
        const toggle = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        toggle.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggle.textContent = type === 'password' ? 'Show' : 'Hide';
        });

        // Basic client-side validation styling
        const form = document.querySelector('.register-form');
        form.addEventListener('submit', e => {
            let valid = true;
            form.querySelectorAll('input').forEach(input => {
                if (!input.checkValidity()) {
                    valid = false;
                    input.classList.add('invalid');
                } else {
                    input.classList.remove('invalid');
                }
            });
            if (!valid) e.preventDefault();
        });
    </script>
</body>
</html>
